<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instagram Grid</title>

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <!-- Swiper -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
  <!-- AOS -->
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css"/>

  <link rel="preload" href="/fonts/NewScience/NewScienceTRIAL-Regular.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="../css/style.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #000;
    }

    body.no-scroll {
      overflow: hidden;
      touch-action: none;
    }
  </style>
</head>

<body>

    <div id="header-placeholder"></div>

    <section class="mf-faq">
        <h1 class="mf-faq__title">SUPERCARS</h2>
    </section>


    <div class="grid" id="grid"></div>

    <div class="ig-modal" id="modal">
        <div class="post">
            <div class="close" onclick="closeModal()">&times;</div>
            <div class="nav prev" onclick="prevImage()">&#10094;</div>
            <div class="nav next" onclick="nextImage()">&#10095;</div>
            <div class="img-wrapper" id="imgWrapper">
                <img id="modalImg" />
            </div>
            <div class="dots" id="dots"></div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="../js/header.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

    <script>
        AOS.init();

        fetch("../header.html").then(r => r.text()).then(d => {
        document.getElementById("header-placeholder").innerHTML = d;
        });

        fetch("../footer.html").then(r => r.text()).then(d => {
        document.getElementById("footer-placeholder").innerHTML = d;
        });

        const posts = [
            {
                title: "Ime auta",
                images: [
                "../img/image00003.jpg",
                "../img/image00007.jpg",
                "../img/image00006.jpg"
                ]
            },
            {
                title: "Ime auta 2",
                images: [
                "../img/image00010.jpg",
                "../img/image00009.jpg"
                ]
            },
            {
                title: "Ime auta 3",
                images: [
                "../img/image00002.jpg",
                "../img/image00008.jpg"
                ]
            },
            {
                title: "Ime auta 4",
                images: [
                    "../img/image00002.jpg",
                "../img/image00008.jpg"
                ]
            },
            {
                images: [
                "../img/image00003.jpg",
                "../img/image00007.jpg",
                "../img/image00006.jpg"
                ]
            },
            {
                images: [
                "../img/image00010.jpg",
                "../img/image00009.jpg"
                ]
            }
        ];

        let currentPost = 0;
        let currentImg = 0;

        const grid = document.getElementById("grid");
        const modal = document.getElementById("modal");
        const modalImg = document.getElementById("modalImg");
        const dots = document.getElementById("dots");

        function renderGrid() {
            posts.forEach((post, index) => {
                const div = document.createElement("div");
                div.className = "grid-item";

                div.innerHTML = `
                <img src="${post.images[0]}" />

                <div class="grid-title">
                    ${post.title || ""}
                </div>

                ${post.images.length > 1 ? `
                    <div class="grid-badge">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 8.25V6a2.25 2.25 0 0 0-2.25-2.25H6A2.25 2.25 0 0 0 3.75 6v8.25A2.25 2.25 0 0 0 6 16.5h2.25m8.25-8.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-7.5A2.25 2.25 0 0 1 8.25 18v-1.5m8.25-8.25h-6a2.25 2.25 0 0 0-2.25 2.25v6" />
                        </svg>
                    </div>` : ""}
                `;

                div.onclick = () => openPost(index);
                grid.appendChild(div);
            });
        }

        function openPost(index) {
            currentPost = index;
            currentImg = 0;
            modal.classList.add("active");
            document.body.classList.add("no-scroll");
            renderPost();
        }

        function closeModal() {
            modal.classList.remove("active");
            document.body.classList.remove("no-scroll");
        }

        function renderPost() {
            const post = posts[currentPost];
            modalImg.src = post.images[currentImg];

            dots.innerHTML = "";
            post.images.forEach((_, i) => {
                const dot = document.createElement("div");
                dot.className = "dot" + (i === currentImg ? " active" : "");
                dots.appendChild(dot);
            });
        }

        function nextImage() {
            const post = posts[currentPost];

            if (currentImg < post.images.length - 1) {
                currentImg++;
                renderPost();
            } else {
                bounce();
            }
        }

        function prevImage() {
            if (currentImg > 0) {
                currentImg--;
                renderPost();
            } else {
                bounce();
            }
        }

        const imgWrapper = document.getElementById("imgWrapper");

        function bounce() {
            imgWrapper.animate([
                { transform: "scale(1)" },
                { transform: "scale(0.97)" },
                { transform: "scale(1)" }
            ], {
                duration: 180,
                easing: "ease-out"
            });
        }

        let startX = 0;

        modal.addEventListener("touchstart", e => {
            startX = e.touches[0].clientX;
        });

        modal.addEventListener("touchend", e => {
            let diff = startX - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 50) {
                const post = posts[currentPost];

                if (diff > 0) {
                if (currentImg < post.images.length - 1) {
                    nextImage();
                } else {
                    bounce();
                }
                }

                else {
                if (currentImg > 0) {
                    prevImage();
                } else {
                    bounce();
                }
                }
            }
        });

        renderGrid();
    </script>

</body>
</html>
